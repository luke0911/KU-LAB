spring:
  profiles:
    default: dev
  application:
    name: digital-twin
  jpa: # JPA 사용 설정
    hibernate:
      ddl-auto: update # validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        use_sql_comments: true
        highlight_sql: true
server:
  port: 8080
  servlet:
    context-path: /spring

# Swagger URL Setting
springdoc:
  swagger-ui:
    path: /api/swagger-ui
  api-docs:
    path: /api/v3/docs